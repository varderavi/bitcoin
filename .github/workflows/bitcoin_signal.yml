name: Bitcoin Movement Agent

on:
  schedule:
    # દર ૧૫ મિનિટે રન થશે, ૨૪ કલાક અને ૭ દિવસ
    - cron: '*/15 * * * *'
  workflow_dispatch: # આનાથી તમે જાતે પણ બટન દબાવીને રન કરી શકશો

jobs:
  bitcoin_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz -q
      - name: Run Bitcoin Check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bitcoin_alert_once.py
